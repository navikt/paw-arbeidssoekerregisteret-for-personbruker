name: Build and deploy

on:
    push:
        branches:
            - main
            - dev/*

jobs:
    test:
        name: Run tests
        runs-on: ubuntu-latest
        permissions:
            contents: 'read'
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - name: Set up node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '24.18.0'
                  cache: 'pnpm'
                  registry-url: 'https://npm.pkg.github.com'

            - name: Install
              run: pnpm install --frozen-lockfile --ignore-scripts
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
                  HUSKY: 0

            - name: Test
              run: pnpm test:ci

            - name: Knip
              run: pnpm dlx knip --no-exit-code --reporter=markdown >> "$GITHUB_STEP_SUMMARY"

    build:
        name: Build and Publish Docker image
        needs: [test]
        runs-on: ubuntu-latest
        permissions:
            contents: 'read'
            packages: 'write'
            id-token: 'write'
        outputs:
            image: ${{ steps.docker-build-push.outputs.image }}
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - name: Set up node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '24.18.0'
                  cache: 'pnpm'
                  registry-url: 'https://npm.pkg.github.com'

            - name: Install
              run: pnpm install --frozen-lockfile --ignore-scripts
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
                  HUSKY: 0

            - name: Build
              run: pnpm build
              env:
                  NEXT_PUBLIC_ASSET_PREFIX: https://cdn.nav.no/paw/arbeidssoekerregisteret
                  NEXT_PUBLIC_BASE_PATH: /arbeidssoekerregisteret
                  HUSKY: 0

            - name: Build storybook-static
              run: pnpm build-storybook

            - name: Install Playwright
              run: pnpm exec playwright install --with-deps

            - name: Run test-storybook
              run: pnpm dlx concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
                  "pnpm dlx http-server public/storybook --port 6006 --silent" \
                  "pnpm dlx wait-on tcp:127.0.0.1:6006 && pnpm test-storybook"

            - name: Upload static files to NAV CDN
              uses: nais/deploy/actions/cdn-upload/v2@2d18f050f07b6a007864c6a57070ed915d571beb
              with:
                  team: paw
                  source: ./.next/static
                  destination: arbeidssoekerregisteret/_next
                  identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
                  project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}

            - name: Push docker image to GAR
              uses: nais/docker-build-push@31c3a7321909bcb20799fdf46153fec721fd9512 # v0
              id: docker-build-push
              with:
                  team: paw
                  identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
                  project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}

    deploy-dev:
        name: Deploy to dev
        permissions:
            contents: 'read'
            id-token: 'write'
        needs: [build, apply-apitoken-unleash]
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/dev')
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Deploy
              uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # v2
              env:
                  CLUSTER: dev-gcp
                  RESOURCE: .nais/dev-gcp/nais.yaml
                  VAR: image=${{ needs.build.outputs.image }}
                  PRINT_PAYLOAD: true

    deploy-prod:
        name: Deploy to prod
        permissions:
            contents: 'read'
            id-token: 'write'
        needs: [build, apply-apitoken-unleash]
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Deploy
              uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # v2
              env:
                  CLUSTER: prod-gcp
                  RESOURCE: .nais/prod-gcp/nais.yaml
                  VAR: image=${{ needs.build.outputs.image }}
                  PRINT_PAYLOAD: true

    apply-apitoken-unleash:
        name: Legger til ApiToken for Unleash
        permissions:
            contents: 'read'
            id-token: 'write'
        runs-on: ubuntu-latest
        needs: [build]
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: deploy to dev
              uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # v2
              env:
                  CLUSTER: dev-gcp
                  RESOURCE: .nais/dev-gcp/unleash-apitoken.yaml
            - name: deploy to prod
              if: github.ref == 'refs/heads/main'
              uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # v2
              env:
                  CLUSTER: prod-gcp
                  RESOURCE: .nais/prod-gcp/unleash-apitoken.yaml
